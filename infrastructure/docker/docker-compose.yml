version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: platform_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_password}
      POSTGRES_DB: platform_global
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_admin -d platform_global"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: platform_pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://platform_admin:${POSTGRES_PASSWORD:-local_dev_password}@postgres:5432/platform_global
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    ports:
      - "5433:5432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: platform_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-local_redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-local_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  maildev:
    image: maildev/maildev
    container_name: platform_maildev
    ports:
      - "1080:1080"   # Web UI
      - "1025:1025"   # SMTP

volumes:
  postgres_data:
  redis_data:
